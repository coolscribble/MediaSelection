<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="30" height="14" rx="6" fill="rgba(255,255,255,0.08)"/>
  <!-- Dice face: 5 dots (quincunx) -->
  <circle cx="9.5"  cy="9.5"  r="2.6" fill="white"/>
  <circle cx="22.5" cy="9.5"  r="2.6" fill="white"/>
  <circle cx="16"   cy="16"   r="2.6" fill="white"/>
  <circle cx="9.5"  cy="22.5" r="2.6" fill="white"/>
  <circle cx="22.5" cy="22.5" r="2.6" fill="white"/>
</svg>
